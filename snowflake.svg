<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Snowflake - thick black outline on white, coloring book style -->
  <g fill="none" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">

    <!-- Vertical main axis -->
    <line x1="200" y1="20" x2="200" y2="380" />

    <!-- 60-degree axis (top-right to bottom-left) -->
    <line x1="200" y1="20" x2="200" y2="380" transform="rotate(60, 200, 200)" />

    <!-- 120-degree axis (top-left to bottom-right) -->
    <line x1="200" y1="20" x2="200" y2="380" transform="rotate(120, 200, 200)" />

    <!-- Branch decorations - repeated 3 times at 0, 60, 120 degrees -->
    <g id="branch">
      <!-- Outer V-branch -->
      <line x1="200" y1="100" x2="170" y2="60" />
      <line x1="200" y1="100" x2="230" y2="60" />

      <!-- Middle V-branch -->
      <line x1="200" y1="160" x2="165" y2="120" />
      <line x1="200" y1="160" x2="235" y2="120" />

      <!-- Inner V-branch -->
      <line x1="200" y1="220" x2="175" y2="190" />
      <line x1="200" y1="220" x2="225" y2="190" />

      <!-- Small diamonds along axis -->
      <polygon points="200,115 190,110 200,105 210,110" />
      <polygon points="200,175 190,170 200,165 210,170" />

      <!-- Tip decorations -->
      <line x1="200" y1="20" x2="215" y2="35" />
      <line x1="200" y1="20" x2="185" y2="35" />

      <!-- Bottom tip -->
      <line x1="200" y1="380" x2="215" y2="365" />
      <line x1="200" y1="380" x2="185" y2="365" />
    </g>

    <use href="#branch" transform="rotate(60, 200, 200)" />
    <use href="#branch" transform="rotate(120, 200, 200)" />

    <!-- Outer circle connector -->
    <circle cx="200" cy="200" r="140" />

    <!-- Small decorative diamonds on the circle at each axis -->
    <polygon points="200,57 192,52 200,47 208,52" />
    <polygon points="278,122 270,117 278,112 286,117" />
    <polygon points="278,278 270,273 278,268 286,273" />
    <polygon points="200,343 192,338 200,333 208,338" />
    <polygon points="122,278 114,273 122,268 130,273" />
    <polygon points="122,122 114,117 122,112 130,117" />

    <!-- Diamond center -->
    <polygon points="200,200 190,195 200,190 210,195" />
    <polygon points="200,200 195,210 200,220 205,210" stroke-width="4" />
    <polygon points="200,200 210,205 200,210 190,205" stroke-width="4" />
    <polygon points="200,200 205,190 200,180 195,190" stroke-width="4" />

  </g>
</svg>